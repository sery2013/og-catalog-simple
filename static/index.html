<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔷 OpenGradient Catalog</title>
  <style>
    :root { --primary: #06B6D4; --primary-light: #22D3EE; --bg-dark: #0F172A; --bg-card: rgba(15, 23, 42, 0.7); --text: #F8FAFC; --border: rgba(34, 211, 238, 0.3); --radius: 12px; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 30px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: 0.3s; }
    .card:hover { border-color: var(--primary-light); transform: translateY(-3px); }
    .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; margin-top: 8px; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #1e293b; border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
    pre { background: #000; color: #22c55e; padding: 15px; border-radius: 8px; font-size: 12px; overflow-x: auto; }
    .chat-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; }
    .msg.user { background: var(--primary); align-self: flex-end; }
    .msg.bot { background: rgba(255,255,255,0.1); align-self: flex-start; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align:center;">🔷 OpenGradient Catalog</h1>
    <div class="grid" id="grid"></div>
  </div>

  <div class="modal" id="detailModal">
    <div class="modal-content">
      <h2 id="mName">Model Details</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
          <div class="chat-box" id="chatMsgs"></div>
          <div style="display:flex; gap:8px;">
            <input type="text" id="chatInput" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:#0f172a; color:white;" placeholder="Ask AI...">
            <button class="btn-primary" style="width:70px; border-radius:8px;" onclick="sendChat()">Send</button>
          </div>
        </div>
        <div>
          <strong>Technical Config (JSON)</strong>
          <pre id="jsonBox"></pre>
          <button class="btn btn-primary" onclick="copyJSON()">📋 Copy JSON</button>
          <button class="btn btn-secondary" id="forkBtn">🛠 Fork This Model</button>
        </div>
      </div>
      <button class="btn-secondary" onclick="closeModals()" style="margin-top:20px;">Close</button>
    </div>
  </div>

  <div class="modal" id="forkModal">
    <div class="modal-content" style="max-width:400px;">
      <h2>Create Fork</h2>
      <input type="text" id="fName" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border); background:#0f172a; color:white;" placeholder="New Model Name">
      <textarea id="fDesc" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border); background:#0f172a; color:white;" placeholder="Description"></textarea>
      <button class="btn btn-primary" onclick="submitFork()">🚀 Deploy Fork</button>
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let curId = null;

    async function load() {
      const r = await fetch(`${API}/api/models`);
      const data = await r.json();
      document.getElementById('grid').innerHTML = data.map(m => `
        <div class="card">
          <h3>${m.name}</h3>
          <p style="color:#94a3b8; font-size:14px; height:40px; overflow:hidden;">${m.description}</p>
          <button class="btn btn-primary" onclick="openDetails('${m.id}')">💬 Details & Chat</button>
          <button class="btn btn-secondary" onclick="window.open('https://hub.opengradient.ai/models/${m.id.replace('-','/')}')">🌐 View on Hub</button>
        </div>
      `).join('');
    }

    async function openDetails(id) {
      curId = id;
      const r = await fetch(`${API}/api/models/${id}`);
      const m = await r.json();
      document.getElementById('mName').textContent = m.name;
      document.getElementById('jsonBox').textContent = JSON.stringify(m.raw_data || m, null, 2);
      document.getElementById('chatMsgs').innerHTML = '<div class="msg bot">System: Connected to OG Node.</div>';
      document.getElementById('forkBtn').onclick = () => openFork(m);
      document.getElementById('detailModal').classList.add('active');
    }

    function openFork(m) {
      document.getElementById('fName').value = `fork-${m.name}`;
      document.getElementById('fDesc').value = `Custom fork of ${m.id}`;
      document.getElementById('forkModal').classList.add('active');
    }

    async function submitFork() {
      await fetch(`${API}/api/models/create`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name: document.getElementById('fName').value, description: document.getElementById('fDesc').value })
      });
      closeModals(); load();
    }

    async function sendChat() {
      const msg = document.getElementById('chatInput').value;
      if(!msg) return;
      document.getElementById('chatMsgs').innerHTML += `<div class="msg user">${msg}</div>`;
      document.getElementById('chatInput').value = '';
      const r = await fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ model_id: curId, message: msg })
      });
      const res = await r.json();
      document.getElementById('chatMsgs').innerHTML += `<div class="msg bot">${res.reply}</div>`;
    }

    function copyJSON() {
      navigator.clipboard.writeText(document.getElementById('jsonBox').textContent);
      alert('Copied!');
    }

    function closeModals() {
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    }

    load();
  </script>
</body>
</html>

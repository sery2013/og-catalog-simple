<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔷 OpenGradient Catalog</title>
  <style>
    :root { --primary: #06B6D4; --bg: #0F172A; --card: rgba(15, 23, 42, 0.7); --border: rgba(34, 211, 238, 0.3); }
    body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
    .btn { padding: 10px; border-radius: 8px; cursor: pointer; border: none; width: 100%; margin-top: 10px; font-weight: bold; }
    .btn-chat { background: var(--primary); color: white; }
    .btn-view { background: rgba(255,255,255,0.1); color: white; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #1e293b; padding: 30px; border-radius: 12px; width: 90%; max-width: 900px; }
    .chat-area { height: 300px; overflow-y: auto; background: #000; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    pre { background: #000; color: #0f0; padding: 10px; border-radius: 8px; font-size: 11px; max-height: 200px; overflow: auto; }
  </style>
</head>
<body>
  <h1>🔷 OpenGradient Catalog</h1>
  <div class="grid" id="grid"></div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="mTitle">Details</h2>
      <div style="display: flex; gap: 20px;">
        <div style="flex: 1;">
          <div class="chat-area" id="chatMsgs"></div>
          <input type="text" id="chatInput" style="width:70%; padding:10px;" placeholder="Message...">
          <button onclick="send()" style="width:25%; padding:10px;">Send</button>
        </div>
        <div style="flex: 1;">
          <strong>Technical Config</strong>
          <pre id="json"></pre>
          <button class="btn btn-chat" onclick="openFork()">🛠 Fork / Deploy</button>
          <button class="btn btn-view" onclick="closeM()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentId = null;
    async function load() {
      const r = await fetch('/api/models');
      const data = await r.json();
      document.getElementById('grid').innerHTML = data.map(m => `
        <div class="card">
          <h3>${m.name}</h3>
          <p>${m.description}</p>
          <button class="btn btn-chat" onclick="openM('${m.id}')">💬 Chat & Details</button>
        </div>
      `).join('');
    }

    async function openM(id) {
      currentId = id;
      const r = await fetch(`/api/models/${id}`);
      const m = await r.json();
      document.getElementById('mTitle').textContent = m.name;
      document.getElementById('json').textContent = JSON.stringify(m, null, 2);
      document.getElementById('chatMsgs').innerHTML = '<div>System: SDK Connected.</div>';
      document.getElementById('modal').classList.add('active');
    }

    async function send() {
      const val = document.getElementById('chatInput').value;
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ model_id: currentId, message: val })
      });
      const res = await r.json();
      document.getElementById('chatMsgs').innerHTML += `<div>User: ${val}</div><div>Bot: ${res.reply}</div>`;
      document.getElementById('chatInput').value = '';
    }

    async function openFork() {
        const name = prompt("Enter new model name:");
        if(!name) return;
        await fetch('/api/models/create', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, description: "Forked model" })
        });
        alert("Deployed!");
        closeM(); load();
    }

    function closeM() { document.getElementById('modal').classList.remove('active'); }
    load();
  </script>
</body>
</html>

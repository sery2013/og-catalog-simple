<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔷 OpenGradient Catalog</title>
  <style>
    :root { --primary: #06B6D4; --primary-dark: #0891B2; --primary-light: #22D3EE; --accent: #14B8A6; --bg-dark: #0F172A; --bg-card: rgba(15, 23, 42, 0.7); --text: #F8FAFC; --text-secondary: #94A3B8; --border: rgba(34, 211, 238, 0.3); --radius: 12px; --live: #ef4444; --live-orange: #f97316; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); overflow-x: hidden; }
    .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 40px; padding: 40px; background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); }
    h1 { font-size: 3rem; background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stats-bar { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; padding: 24px; background: rgba(6,182,212,0.1); border: 1px solid var(--border); border-radius: var(--radius); }
    .stat-item { text-align: center; padding: 0 20px; }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary-light); display: block; }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 28px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; transition: 0.3s; }
    .card:hover { transform: translateY(-5px); border-color: var(--primary-light); }
    .badge { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
    .badge-live { background: linear-gradient(135deg, var(--live), var(--live-orange)); }
    .buttons { display: flex; gap: 12px; margin-top: 24px; }
    .btn { flex: 1; padding: 12px; border-radius: var(--radius); font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; }
    .btn-primary { background: var(--primary); color: #fff; border: none; }
    .btn-secondary { background: rgba(6,182,212,0.1); color: var(--primary-light); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.9); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #1e293b; border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 90%; max-width: 1000px; }
    .chat-layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; margin-top: 20px; }
    .messages { height: 350px; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); border-radius: var(--radius); margin-bottom: 15px; border: 1px solid var(--border); }
    .message { margin-bottom: 10px; padding: 10px; border-radius: 8px; font-size: 14px; max-width: 80%; }
    .message.user { background: var(--primary); align-self: flex-end; margin-left: auto; }
    .message.bot { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
    .sync-status { text-align: center; padding: 10px; font-size: 12px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>🔷 OpenGradient Catalog</h1><p>Decentralized AI Model Hub • 16+ Verified Models</p></header>
    <div class="sync-status" id="syncStatus">🔄 Loading sync status...</div>
    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><span class="stat-value" id="statModels">-</span><span class="stat-label">Models</span></div>
      <div class="stat-item"><span class="stat-value" id="statLive">-</span><span class="stat-label">Live</span></div>
      <div class="stat-item"><span class="stat-value" id="statLikes">-</span><span class="stat-label">Likes</span></div>
      <div class="stat-item"><span class="stat-value" id="statInferences">-</span><span class="stat-label">Inferences</span></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="modal" id="chatModal">
    <div class="modal-content">
      <h3 id="chatTitle">Model Chat</h3>
      <div class="chat-layout">
        <div>
          <div class="messages" id="chatMsgs" style="display:flex; flex-direction:column;"></div>
          <div style="display:flex; gap:10px;">
            <input type="text" id="chatInput" style="flex:1; padding:12px; border-radius:8px; background:#0f172a; border:1px solid var(--border); color:white;" placeholder="Type a message...">
            <button class="btn btn-primary" style="width:100px;" onclick="sendChat()">Send</button>
          </div>
        </div>
        <div style="font-size:13px; color:var(--text-secondary);" id="chatSidebar"></div>
      </div>
      <button class="btn btn-secondary" style="margin-top:20px;" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let curModel = null;

    async function load() {
      const r = await fetch(`${API}/api/models`);
      const models = await r.json();
      document.getElementById('grid').innerHTML = models.map(m => `
        <div class="card">
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <strong>${m.name}</strong>
            <span class="badge ${m.is_live ? 'badge-live' : ''}">${m.is_live ? 'LIVE' : 'BASE'}</span>
          </div>
          <p style="font-size:13px; color:var(--text-secondary); min-height:40px;">${m.description}</p>
          <div class="buttons">
            <button class="btn btn-primary" onclick="openChat('${m.id}')">💬 Chat</button>
            <button class="btn btn-secondary" onclick="window.open('https://hub.opengradient.ai/models/${m.id.replace('-','/')}', '_blank')">🔗 View</button>
          </div>
        </div>
      `).join('');
    }

    async function openChat(id) {
      curModel = id;
      const r = await fetch(`${API}/api/models/${id}`);
      const m = await r.json();
      document.getElementById('chatTitle').textContent = m.name;
      document.getElementById('chatSidebar').innerHTML = `<strong>ID:</strong> ${m.id}<br><br>${m.description}`;
      document.getElementById('chatMsgs').innerHTML = '<div class="message bot">System: Connection to OpenGradient Node established. How can I assist with this model?</div>';
      document.getElementById('chatModal').classList.add('active');
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if(!msg || !curModel) return;

      const chatMsgs = document.getElementById('chatMsgs');
      chatMsgs.innerHTML += `<div class="message user">${msg}</div>`;
      input.value = '';
      chatMsgs.scrollTop = chatMsgs.scrollHeight;

      try {
        const r = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ model_id: curModel, message: msg })
        });
        const res = await r.json();
        chatMsgs.innerHTML += `<div class="message bot">${res.reply}</div>`;
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
      } catch(e) { console.error(e); }
    }

    async function loadStats() {
      const r = await fetch(`${API}/api/stats`);
      const s = await r.json();
      document.getElementById('statModels').textContent = s.total_models;
      document.getElementById('statLive').textContent = s.live_models;
      document.getElementById('statLikes').textContent = s.total_likes;
      document.getElementById('statInferences').textContent = s.total_inferences;
      if(s.last_sync) document.getElementById('syncStatus').textContent = `Last Hub Sync: ${new Date(s.last_sync).toLocaleString()}`;
    }

    function closeModal() { document.getElementById('chatModal').classList.remove('active'); }
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });

    load(); loadStats();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔷 OpenGradient Catalog</title>
  <style>
    :root {
      --primary: #06B6D4;
      --primary-dark: #0891B2;
      --primary-light: #22D3EE;
      --accent: #14B8A6;
      --bg-dark: #0F172A;
      --bg-card: rgba(15, 23, 42, 0.7);
      --text: #F8FAFC;
      --text-secondary: #94A3B8;
      --border: rgba(34, 211, 238, 0.3);
      --glow: rgba(6, 182, 212, 0.5);
      --radius: 12px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Digital Background with Mirror Effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, transparent 50%),
        linear-gradient(225deg, rgba(20, 184, 166, 0.1) 0%, transparent 50%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(34, 211, 238, 0.03) 2px,
          rgba(34, 211, 238, 0.03) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(6, 182, 212, 0.03) 2px,
          rgba(6, 182, 212, 0.03) 4px
        );
      pointer-events: none;
      z-index: 0;
    }
    
    /* Animated Grid */
    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      right: -50%;
      bottom: -50%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(20, 184, 166, 0.12) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    
    /* Header with Glass Effect */
    header { 
      text-align: center; 
      margin-bottom: 40px;
      padding: 40px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(6, 182, 212, 0.2);
    }
    
    h1 { 
      font-size: 3rem; 
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      text-shadow: 0 0 80px rgba(6, 182, 212, 0.5);
      letter-spacing: -1px;
    }
    
    .subtitle { 
      color: var(--text-secondary); 
      font-size: 1.2rem;
      font-weight: 400;
    }
    
    /* Stats Bar with Mirror Effect */
    .stats-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
      padding: 24px 32px;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(20, 184, 166, 0.1) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 
        0 8px 32px rgba(6, 182, 212, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    
    .stats-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      animation: shimmer 3s infinite;
    }
    
    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    
    .stat-item {
      text-align: center;
      padding: 12px 24px;
      position: relative;
      z-index: 1;
    }
    
    .stat-value { 
      font-size: 2rem; 
      font-weight: 800; 
      display: block;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stat-label { 
      font-size: 0.85rem; 
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    
    .filters input, .filters select {
      flex: 1;
      min-width: 200px;
      padding: 16px 20px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      color: var(--text);
      transition: all 0.3s;
    }
    
    .filters input:focus, .filters select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
      background: rgba(15, 23, 42, 0.95);
    }
    
    .filters input::placeholder {
      color: var(--text-secondary);
    }
    
    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 28px;
    }
    
    /* Card with Glass & Mirror Effect */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .card:hover {
      transform: translateY(-8px);
      border-color: var(--primary-light);
      box-shadow: 
        0 20px 60px rgba(6, 182, 212, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    
    .card:hover::before {
      opacity: 1;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    
    .card-title { 
      font-size: 1.3rem; 
      font-weight: 700; 
      flex: 1;
      color: var(--text);
    }
    
    .badge {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.4);
    }
    
    .description { 
      font-size: 14px; 
      color: var(--text-secondary); 
      margin: 16px 0; 
      line-height: 1.6; 
    }
    
    .tags { 
      display: flex; 
      gap: 8px; 
      flex-wrap: wrap; 
      margin: 20px 0; 
    }
    
    .tag {
      background: rgba(6, 182, 212, 0.15);
      color: var(--primary-light);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid rgba(6, 182, 212, 0.3);
      transition: all 0.2s;
    }
    
    .tag:hover {
      background: rgba(6, 182, 212, 0.25);
      transform: translateY(-2px);
    }
    
    .stats { 
      display: flex; 
      gap: 24px; 
      font-size: 13px; 
      color: var(--text-secondary); 
      margin: 20px 0; 
    }
    
    .stats span { 
      display: flex; 
      align-items: center; 
      gap: 6px;
      font-weight: 500;
    }
    
    .buttons { 
      display: flex; 
      gap: 12px; 
      margin-top: 24px; 
    }
    
    .btn {
      flex: 1;
      text-align: center;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.3s;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      box-shadow: 0 4px 16px rgba(6, 182, 212, 0.4);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.6);
    }
    
    .btn-secondary {
      background: rgba(6, 182, 212, 0.1);
      color: var(--primary-light);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: rgba(6, 182, 212, 0.2);
      border-color: var(--primary-light);
      transform: translateY(-2px);
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 100px rgba(6, 182, 212, 0.5);
      position: relative;
    }
    
    .modal-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-header h3 { 
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .modal-close {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: var(--text-secondary);
      font-size: 28px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-close:hover { 
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      transform: rotate(90deg);
    }
    
    /* Chat Layout */
    .chat-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }
    
    @media (max-width: 768px) {
      .chat-layout { grid-template-columns: 1fr; }
    }
    
    .model-sidebar {
      background: rgba(6, 182, 212, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 13px;
    }
    
    .model-sidebar strong { 
      display: block; 
      margin-bottom: 8px; 
      color: var(--primary-light);
      font-size: 14px;
    }
    
    .messages { 
      max-height: 450px; 
      overflow-y: auto; 
      padding: 20px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) transparent;
    }
    
    .message {
      margin-bottom: 16px;
      padding: 14px 18px;
      border-radius: var(--radius);
      max-width: 85%;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user { 
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      margin-left: auto;
      box-shadow: 0 4px 16px rgba(6, 182, 212, 0.4);
    }
    
    .message.bot { 
      background: rgba(30, 41, 59, 0.8);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .input-area { 
      display: flex; 
      gap: 12px; 
    }
    
    .input-area input {
      flex: 1;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      font-size: 15px;
      transition: all 0.3s;
    }
    
    .input-area input:focus { 
      outline: none; 
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
    }
    
    .input-area input::placeholder {
      color: var(--text-secondary);
    }
    
    .input-area button {
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(6, 182, 212, 0.4);
    }
    
    .input-area button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.6);
    }
    
    /* Form */
    .progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
      padding: 20px;
      background: rgba(6, 182, 212, 0.1);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    
    .step { 
      color: var(--text-secondary); 
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.3s;
    }
    
    .step.active { 
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.4);
    }
    
    .arrow { 
      color: var(--primary-light);
      font-size: 20px;
    }
    
    .form-group { 
      margin-bottom: 24px; 
    }
    
    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .form-group input, 
    .form-group textarea, 
    .form-group select {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      font-size: 15px;
      transition: all 0.3s;
    }
    
    .form-group input:focus, 
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
      background: rgba(15, 23, 42, 0.95);
    }
    
    .form-group textarea { 
      resize: vertical; 
      min-height: 120px; 
    }
    
    .wallet-section {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(20, 184, 166, 0.1));
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: var(--radius);
      margin-bottom: 24px;
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    
    .wallet-section label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: var(--primary-light);
      font-size: 14px;
    }
    
    .wallet-section input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.9);
      color: var(--primary-light);
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    
    .wallet-section input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
    }
    
    .wallet-warning {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.5;
    }
    
    .loading, .empty {
      text-align: center;
      font-size: 18px;
      grid-column: 1 / -1;
      color: var(--text-secondary);
      padding: 60px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-light);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .filters { flex-direction: column; }
      .filters input, .filters select { width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .modal-content { padding: 24px; }
      .stats-bar { padding: 16px 20px; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔷 OpenGradient Catalog</h1>
      <p class="subtitle">Decentralized AI Model Hub</p>
    </header>

    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <span class="stat-value" id="statModels">-</span>
        <span class="stat-label">Total Models</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statLikes">-</span>
        <span class="stat-label">Total Likes</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statInferences">-</span>
        <span class="stat-label">Inferences</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statCategories">-</span>
        <span class="stat-label">Categories</span>
      </div>
    </div>

    <div class="filters">
      <input type="text" id="search" placeholder="🔍 Search models...">
      <select id="category">
        <option value="all">All Categories</option>
        <option value="defi">DeFi</option>
        <option value="language">Language Models</option>
        <option value="risk">Risk Models</option>
        <option value="multimodal">Multimodal</option>
        <option value="protocol">Protocol Optimization</option>
      </select>
    </div>

    <div class="grid" id="grid"><p class="loading">⏳ Loading models from OpenGradient...</p></div>
  </div>

  <!-- Chat Modal -->
  <div class="modal" id="chatModal">
    <div class="modal-content" style="max-width:1000px;">
      <div class="modal-header">
        <h3 id="chatTitle">💬 Chat</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="chat-layout">
        <div>
          <div class="messages" id="chatMsgs"></div>
          <div class="input-area">
            <input type="text" id="chatInput" placeholder="Type your question..." onkeypress="if(event.key==='Enter')sendChat()">
            <button onclick="sendChat()">➤ Send</button>
          </div>
        </div>
        <div class="model-sidebar" id="chatSidebar"></div>
      </div>
    </div>
  </div>

  <!-- Create Modal -->
  <div class="modal" id="createModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>🛠 Create Model</h3>
        <button class="modal-close" onclick="closeCreate()">&times;</button>
      </div>
      
      <div class="progress">
        <span class="step active">1. Select</span>
        <span class="arrow">→</span>
        <span class="step">2. Configure</span>
        <span class="arrow">→</span>
        <span class="step">3. Deploy</span>
      </div>

      <div class="wallet-section">
        <label>🔑 Wallet Private Key (for deployment)</label>
        <input type="password" id="walletKey" placeholder="0x...">
        <div class="wallet-warning">⚠️ Your key is encrypted and never stored. Required for on-chain deployment.</div>
      </div>

      <form id="createForm" onsubmit="doCreate(event)">
        <div class="form-group">
          <label>Model Name *</label>
          <input type="text" id="cName" required placeholder="og-my-model-v1">
        </div>
        <div class="form-group">
          <label>Description *</label>
          <textarea id="cDesc" required placeholder="Describe your model's capabilities..."></textarea>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="cCat">
            <option>DeFi</option>
            <option>Language</option>
            <option>Risk</option>
            <option>Multimodal</option>
            <option>Protocol</option>
          </select>
        </div>
        <div class="form-group">
          <label>Base Model</label>
          <input type="text" id="cBase" placeholder="og-llama3-fintune-v2">
        </div>
        <div class="form-group">
          <label>Configuration</label>
          <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
            <label style="font-weight:400;display:flex;align-items:center;gap:10px;cursor:pointer;">
              <input type="checkbox" style="width:18px;height:18px;accent-color:var(--primary);"> 
              <span>Enable real-time inference</span>
            </label>
            <label style="font-weight:400;display:flex;align-items:center;gap:10px;cursor:pointer;">
              <input type="checkbox" style="width:18px;height:18px;accent-color:var(--primary);"> 
              <span>Add webhook callback</span>
            </label>
            <label style="font-weight:400;display:flex;align-items:center;gap:10px;cursor:pointer;">
              <input type="checkbox" style="width:18px;height:18px;accent-color:var(--primary);"> 
              <span>Export to ONNX</span>
            </label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">→ Deploy Model</button>
      </form>
      <div id="cStatus" style="margin-top:24px;padding:20px;background:rgba(6,182,212,0.1);border:1px solid var(--border);border-radius:var(--radius);display:none;"></div>
    </div>
  </div>

  <script>
    const API = '';
    let curModel = null, sessId = null;

    async function loadStats() {
      try {
        const r = await fetch(`${API}/api/stats`);
        const s = await r.json();
        document.getElementById('statModels').textContent = s.total_models || '-';
        document.getElementById('statLikes').textContent = (s.total_likes || 0).toLocaleString();
        document.getElementById('statInferences').textContent = (s.total_inferences || 0).toLocaleString();
        document.getElementById('statCategories').textContent = s.categories || '-';
      } catch(e) { console.error('Stats error:', e); }
    }

    async function load() {
      const s = document.getElementById('search').value, c = document.getElementById('category').value;
      const p = new URLSearchParams();
      if(c!=='all') p.append('category', c);
      if(s) p.append('search', s);
      p.append('limit', '50');
      
      try {
        const r = await fetch(`${API}/api/models?${p}`), m = await r.json();
        document.getElementById('grid').innerHTML = m.length ? m.map(x=>`
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">${x.name}</h3>
              <span class="badge">${x.category}</span>
            </div>
            <p class="description">${x.description}</p>
            <div class="tags">${x.tags.slice(0,4).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
            <div class="stats">
              <span>⭐ ${x.stats.likes}</span>
              <span>🔄 ${x.stats.inferences}</span>
            </div>
            <div class="buttons">
              <button class="btn btn-primary" onclick="openChat('${x.id}')">💬 Ask about model</button>
              <button class="btn btn-secondary" onclick="openCreate('${x.id}')">🛠 Create similar</button>
            </div>
          </div>`).join('') : '<p class="empty">No models found</p>';
        loadStats();
      } catch(e) {
        document.getElementById('grid').innerHTML = '<p class="empty">❌ Error loading models</p>';
        console.error(e);
      }
    }

    function openChat(id) {
      curModel = id; sessId = null;
      document.getElementById('chatMsgs').innerHTML = '';
      document.getElementById('chatInput').value = '';
      
      fetch(`${API}/api/models/${id}`).then(r=>r.json()).then(m=>{
        document.getElementById('chatTitle').textContent = `💬 Chat: ${m.id}`;
        document.getElementById('chatSidebar').innerHTML = `
          <strong>${m.name}</strong>
          <div style="margin:10px 0;"><strong>Category:</strong> ${m.category}</div>
          <div style="margin:10px 0;"><strong>Description:</strong> ${m.description}</div>
          <div style="margin:10px 0;"><strong>Tags:</strong> ${m.tags.join(', ')}</div>
          <div style="margin:10px 0;"><strong>Stats:</strong> ⭐ ${m.stats.likes} | 🔄 ${m.stats.inferences}</div>
        `;
      });
      document.getElementById('chatModal').classList.add('active');
    }
    function closeModal() { document.getElementById('chatModal').classList.remove('active'); curModel = null; }
    
    async function sendChat() {
      const inp = document.getElementById('chatInput'), q = inp.value.trim();
      if(!q) return;
      const msgs = document.getElementById('chatMsgs');
      msgs.innerHTML += `<div class="message user">${q}</div>`;
      inp.value = '';
      msgs.scrollTop = msgs.scrollHeight;
      
      try {
        const r = await fetch(`${API}/api/chat`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({query:q, model_id:curModel, session_id:sessId})
        });
        const d = await r.json();
        sessId = d.session_id;
        msgs.innerHTML += `<div class="message bot">${d.reply.replace(/\n/g,'<br>')}</div>`;
        msgs.scrollTop = msgs.scrollHeight;
      } catch(e) { msgs.innerHTML += `<div class="message bot">❌ Connection error</div>`; }
    }

    function openCreate(base) {
      document.getElementById('createForm').reset();
      document.getElementById('cBase').value = base || '';
      document.getElementById('cStatus').style.display = 'none';
      document.getElementById('createModal').classList.add('active');
    }
    function closeCreate() { document.getElementById('createModal').classList.remove('active'); }
    
    async function doCreate(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]'), st = document.getElementById('cStatus');
      btn.disabled = true; btn.textContent = '⏳ Deploying...';
      st.style.display = 'block';
      
      try {
        const r = await fetch(`${API}/api/models/create`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            name:document.getElementById('cName').value,
            description:document.getElementById('cDesc').value,
            category:document.getElementById('cCat').value,
            base_model:document.getElementById('cBase').value,
            wallet_key: document.getElementById('walletKey').value || null
          })
        });
        const d = await r.json();
        st.innerHTML = `📋 Task: ${d.task_id}<br>Status: ${d.status}`;
        
        const poll = setInterval(async ()=>{
          const x = await fetch(`${API}/api/tasks/${d.task_id}`).then(r=>r.json());
          let html = `📋 Task: ${d.task_id}<br>`;
          html += `Status: <strong>${x.status}</strong><br>`;
          if(x.progress) html += `Progress: ${x.progress}%<br>`;
          st.innerHTML = html;
          
          if(x.status==='completed') {
            clearInterval(poll);
            st.innerHTML += `<br>✅ Model created: <strong>${x.result?.model_id}</strong>`;
            if(x.result?.tx_hash) st.innerHTML += `<br>🔗 TX: ${x.result.tx_hash.slice(0,20)}...`;
            setTimeout(()=>{closeCreate();load();},3000);
          }
        }, 2000);
      } catch(err) { st.innerHTML = `❌ Error: ${err.message}`; }
      finally { btn.disabled = false; btn.textContent = '→ Deploy Model'; }
    }

    document.getElementById('search').addEventListener('input', load);
    document.getElementById('category').addEventListener('change', load);
    window.onclick = e => { if(e.target.classList.contains('modal')) { closeModal(); closeCreate(); } };
    
    load(); loadStats();
    setInterval(loadStats, 30000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OpenGradient Catalog</title>
  <style>
    :root { --primary: #14b8a6; --bg: #0b0f1a; --card: #161b2a; --border: #2d3748; }
    body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
    
    /* Статистика сверху */
    .stats-bar { display: flex; justify-content: center; gap: 40px; padding: 20px; background: rgba(20, 184, 166, 0.05); border-bottom: 1px solid var(--border); }
    .stat-item { text-align: center; }
    .stat-value { display: block; font-size: 24px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 12px; color: #718096; text-transform: uppercase; }

    /* Поиск и фильтры */
    .toolbar { max-width: 1200px; margin: 20px auto; display: flex; gap: 15px; padding: 0 20px; }
    input, textarea { background: #1a202c; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; }

    .grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .badge { float: right; padding: 2px 8px; border-radius: 12px; font-size: 10px; background: var(--primary); }

    /* Модалка */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
    .modal.active { display: flex; }
    .modal-content { background: #1a202c; width: 90%; max-width: 1000px; padding: 30px; border-radius: 16px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
    
    .chat-box { background: #000; height: 300px; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    pre { background: #000; color: #4ade80; padding: 10px; font-size: 11px; overflow: auto; max-height: 200px; }
    .btn-main { background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div class="stats-bar">
    <div class="stat-item"><span class="stat-value">22</span><span class="stat-label">Models</span></div>
    <div class="stat-item"><span class="stat-value">22</span><span class="stat-label">Live</span></div>
    <div class="stat-item"><span class="stat-value">2530</span><span class="stat-label">Likes</span></div>
    <div class="stat-item"><span class="stat-value">19580</span><span class="stat-label">Inferences</span></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search models..." style="flex:1" oninput="render()">
    <button class="btn-main" onclick="document.getElementById('createModal').classList.add('active')">+ Create Model</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="modal" id="createModal">
    <div class="modal-content" style="display:block; max-width:500px;">
      <h2>Create New Model</h2>
      <input type="text" id="newName" placeholder="Model Name" style="width:100%; margin-bottom:15px;">
      <textarea id="newDesc" placeholder="Description" style="width:100%; height:100px; margin-bottom:15px;"></textarea>
      <button class="btn-main" style="width:100%" onclick="submitModel()">Deploy to Hub</button>
      <button onclick="this.closest('.modal').classList.remove('active')" style="background:none; border:none; color:#718096; width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
  </div>

  <div class="modal" id="detailsModal">
    <div class="modal-content">
      <div>
        <h2 id="mName"></h2>
        <div class="chat-box" id="chat"></div>
        <div style="display:flex; gap:10px;">
          <input type="text" id="msgIn" style="flex:1" placeholder="Message model...">
          <button class="btn-main" onclick="send()">Send</button>
        </div>
      </div>
      <div>
        <h4>Technical Config</h4>
        <pre id="json"></pre>
        <button class="btn-main" style="width:100%" onclick="alert('Copied!')">📋 Copy Config</button>
        <button class="btn-main" style="width:100%; margin-top:10px; background:transparent; border:1px solid var(--primary)" onclick="closeDetails()">Close</button>
      </div>
    </div>
  </div>

  <script>
    let allModels = [];
    let curId = null;

    async function load() {
      const r = await fetch('/api/models');
      allModels = await r.json();
      render();
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = allModels.filter(m => m.name.toLowerCase().includes(q));
      document.getElementById('grid').innerHTML = filtered.map(m => `
        <div class="card">
          <span class="badge">${m.type}</span>
          <h3>${m.name}</h3>
          <p style="color:#718096; font-size:13px;">${m.description}</p>
          <div style="font-size:12px; margin-bottom:15px;">❤️ ${m.stats?.likes || 0} | ⚡ ${m.stats?.inferences || 0}</div>
          <button class="btn-main" style="width:100%" onclick="openDetails('${m.id}')">Chat & Details</button>
        </div>
      `).join('');
    }

    async function submitModel() {
      const name = document.getElementById('newName').value;
      const desc = document.getElementById('newDesc').value;
      if(!name) return alert("Enter name");
      await fetch('/api/models/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, description: desc })
      });
      document.getElementById('createModal').classList.remove('active');
      load(); // Перезагрузит и поставит новую модель в начало
    }

    async function openDetails(id) {
      curId = id;
      const m = allModels.find(x => x.id === id);
      document.getElementById('mName').textContent = m.name;
      document.getElementById('json').textContent = JSON.stringify(m, null, 2);
      document.getElementById('chat').innerHTML = '<div>System: Connected.</div>';
      document.getElementById('detailsModal').classList.add('active');
    }

    async function send() {
      const text = document.getElementById('msgIn').value;
      if(!text) return;
      document.getElementById('chat').innerHTML += `<div><b>You:</b> ${text}</div>`;
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ model_id: curId, message: text })
      });
      const data = await r.json();
      document.getElementById('chat').innerHTML += `<div><b>Bot:</b> ${data.reply}</div>`;
      document.getElementById('msgIn').value = '';
    }

    function closeDetails() { document.getElementById('detailsModal').classList.remove('active'); }
    load();
  </script>
</body>
</html>

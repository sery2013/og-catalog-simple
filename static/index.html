<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔷 OpenGradient Catalog</title>
  <style>
    :root { --primary: #06B6D4; --primary-dark: #0891B2; --primary-light: #22D3EE; --accent: #14B8A6; --bg-dark: #0F172A; --bg-card: rgba(15, 23, 42, 0.7); --text: #F8FAFC; --text-secondary: #94A3B8; --border: rgba(34, 211, 238, 0.3); --radius: 12px; --live: #ef4444; --live-orange: #f97316; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; position: relative; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: linear-gradient(135deg, rgba(6,182,212,0.1) 0%, transparent 50%), linear-gradient(225deg, rgba(20,184,166,0.1) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 40px; padding: 40px; background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); }
    h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    .subtitle { color: var(--text-secondary); font-size: 1.2rem; }
    .stats-bar { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; padding: 24px 32px; background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(20,184,166,0.1)); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); }
    .stat-item { text-align: center; padding: 12px 24px; }
    .stat-value { font-size: 2rem; font-weight: 800; display: block; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    .filters { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
    .filters input, .filters select { flex: 1; min-width: 200px; padding: 16px 20px; font-size: 15px; border: 1px solid var(--border); border-radius: var(--radius); background: rgba(15,23,42,0.8); color: var(--text); }
    .filters input:focus, .filters select:focus { outline: none; border-color: var(--primary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 28px; }
    .card { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; transition: all 0.3s; position: relative; overflow: hidden; }
    .card:hover { transform: translateY(-8px); border-color: var(--primary-light); box-shadow: 0 20px 60px rgba(6,182,212,0.4); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .card-title { font-size: 1.3rem; font-weight: 700; flex: 1; }
    .badge { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-live { background: linear-gradient(135deg, var(--live), var(--live-orange)); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }
    .description { font-size: 14px; color: var(--text-secondary); margin: 16px 0; line-height: 1.6; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 20px 0; }
    .tag { background: rgba(6,182,212,0.15); color: var(--primary-light); padding: 6px 12px; border-radius: 6px; font-size: 12px; }
    .stats { display: flex; gap: 24px; font-size: 13px; color: var(--text-secondary); margin: 20px 0; }
    .buttons { display: flex; gap: 12px; margin-top: 24px; }
    .btn { flex: 1; text-align: center; padding: 14px 20px; border-radius: var(--radius); font-weight: 600; font-size: 14px; cursor: pointer; border: 1px solid var(--border); transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border: none; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(6,182,212,0.6); }
    .btn-secondary { background: rgba(6,182,212,0.1); color: var(--primary-light); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.95)); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 1.5rem; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .modal-close { background: rgba(255,255,255,0.1); border: none; color: var(--text-secondary); font-size: 28px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    .modal-close:hover { background: rgba(239,68,68,0.2); color: #ef4444; transform: rotate(90deg); }
    .chat-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    @media (max-width: 768px) { .chat-layout { grid-template-columns: 1fr; } }
    .model-sidebar { background: rgba(6,182,212,0.1); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; }
    .model-sidebar strong { display: block; margin-bottom: 8px; color: var(--primary-light); }
    .messages { max-height: 450px; overflow-y: auto; padding: 20px 0; }
    .message { margin-bottom: 16px; padding: 14px 18px; border-radius: var(--radius); max-width: 85%; line-height: 1.5; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; margin-left: auto; }
    .message.bot { background: rgba(30,41,59,0.8); color: var(--text); border: 1px solid var(--border); }
    .input-area { display: flex; gap: 12px; }
    .input-area input { flex: 1; padding: 16px 20px; border: 1px solid var(--border); border-radius: var(--radius); background: rgba(15,23,42,0.8); color: var(--text); font-size: 15px; }
    .input-area input:focus { outline: none; border-color: var(--primary); }
    .input-area button { padding: 16px 28px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; }
    .progress { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 28px; padding: 20px; background: rgba(6,182,212,0.1); border-radius: var(--radius); border: 1px solid var(--border); }
    .step { color: var(--text-secondary); font-weight: 500; padding: 8px 16px; border-radius: 20px; }
    .step.active { color: #fff; background: linear-gradient(135deg, var(--primary), var(--accent)); font-weight: 700; }
    .arrow { color: var(--primary-light); }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 14px; color: var(--text-secondary); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; border: 1px solid var(--border); border-radius: var(--radius); background: rgba(15,23,42,0.8); color: var(--text); font-size: 15px; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .loading, .empty { text-align: center; font-size: 18px; grid-column: 1 / -1; color: var(--text-secondary); padding: 60px; }
    .sync-status { text-align: center; padding: 12px 24px; margin-bottom: 20px; background: rgba(6,182,212,0.1); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text-secondary); }
    .sync-status.live { background: rgba(239,68,68,0.1); border-color: var(--live); color: var(--live); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔷 OpenGradient Catalog</h1>
      <p class="subtitle">Decentralized AI Model Hub • Live Sync Every 24h</p>
    </header>
    <div class="sync-status" id="syncStatus">🔄 Loading sync status...</div>
    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><span class="stat-value" id="statModels">-</span><span class="stat-label">Total Models</span></div>
      <div class="stat-item"><span class="stat-value" id="statLive">-</span><span class="stat-label">🔥 Live</span></div>
      <div class="stat-item"><span class="stat-value" id="statLikes">-</span><span class="stat-label">Total Likes</span></div>
      <div class="stat-item"><span class="stat-value" id="statInferences">-</span><span class="stat-label">Inferences</span></div>
    </div>
    <div class="filters">
      <input type="text" id="search" placeholder="🔍 Search models...">
      <select id="category"><option value="all">All Categories</option><option value="defi">DeFi</option><option value="language">Language Models</option><option value="risk">Risk Models</option><option value="multimodal">Multimodal</option><option value="protocol">Protocol Optimization</option></select>
      <select id="sourceFilter"><option value="all">All Sources</option><option value="live">🔥 Live Only</option><option value="base">📦 Base Only</option></select>
    </div>
    <div class="grid" id="grid"><p class="loading">⏳ Loading models...</p></div>
  </div>

  <div class="modal" id="chatModal">
    <div class="modal-content" style="max-width:1000px;">
      <div class="modal-header"><h3 id="chatTitle">💬 Chat</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="chat-layout">
        <div><div class="messages" id="chatMsgs"></div><div class="input-area"><input type="text" id="chatInput" placeholder="Ask about this model..." onkeypress="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">➤ Send</button></div></div>
        <div class="model-sidebar" id="chatSidebar"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="createModal">
    <div class="modal-content">
      <div class="modal-header"><h3>🛠 Create Model</h3><button class="modal-close" onclick="closeCreate()">&times;</button></div>
      <div class="progress"><span class="step active">1. Select</span><span class="arrow">→</span><span class="step">2. Configure</span><span class="arrow">→</span><span class="step">3. Deploy</span></div>
      <form id="createForm" onsubmit="doCreate(event)">
        <div class="form-group"><label>Model Name *</label><input type="text" id="cName" required placeholder="og-my-model-v1"></div>
        <div class="form-group"><label>Description *</label><textarea id="cDesc" required placeholder="Describe your model..."></textarea></div>
        <div class="form-group"><label>Category</label><select id="cCat"><option>DeFi</option><option>Language</option><option>Risk</option><option>Multimodal</option><option>Protocol</option></select></div>
        <div class="form-group"><label>Base Model</label><input type="text" id="cBase" placeholder="og-llama3-fintune-v2"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;">→ Deploy Model</button>
      </form>
      <div id="cStatus" style="margin-top:24px;padding:20px;background:rgba(6,182,212,0.1);border:1px solid var(--border);border-radius:var(--radius);display:none;"></div>
    </div>
  </div>

  <script>
    // === ВНИМАНИЕ: ЗАМЕНИТЕ ЭТУ СТРОКУ ===
    // Вставьте сюда URL вашего задеплоенного Python-бэкенда с Render
    // Адрес должен выглядеть примерно так: https://opengradient-tests.onrender.com
    const API = 'https://opengradient-tests.onrender.com';
    
    // Оставляем пустую строку, если вы используете FastAPI StaticFiles
    // const API = ''; 

    let curModel = null, sessId = null;

    async function loadSyncStatus() {
      try {
        const r = await fetch(`${API}/api/stats`), s = await r.json();
        const syncDiv = document.getElementById('syncStatus');
        if (s.last_sync) {
          const hoursAgo = ((Date.now() - new Date(s.last_sync)) / (1000*60*60)).toFixed(1);
          syncDiv.innerHTML = `🔄 Last sync: ${hoursAgo}h ago • +${s.sync_added||0} models`;
          syncDiv.className = hoursAgo < 24 ? 'sync-status' : 'sync-status live';
        }
      } catch(e) { console.error('Sync error:', e); }
    }

    async function loadStats() {
      try {
        const r = await fetch(`${API}/api/stats`), s = await r.json();
        document.getElementById('statModels').textContent = s.total_models || '-';
        document.getElementById('statLive').textContent = s.live_models || '0';
        document.getElementById('statLikes').textContent = (s.total_likes||0).toLocaleString();
        document.getElementById('statInferences').textContent = (s.total_inferences||0).toLocaleString();
      } catch(e) { console.error('Stats error:', e); }
    }

    async function load() {
      const s = document.getElementById('search').value, c = document.getElementById('category').value, src = document.getElementById('sourceFilter').value;
      const p = new URLSearchParams();
      if(c!=='all') p.append('category', c);
      if(s) p.append('search', s);
      if(src==='live') p.append('live_only', 'true');
      try {
        const r = await fetch(`${API}/api/models?${p}`), m = await r.json();
        document.getElementById('grid').innerHTML = m.length ? m.map(x=>`
          <div class="card" data-model-id="${x.id}">
            <div class="card-header"><h3 class="card-title">${x.name}</h3><div style="display:flex;gap:6px;align-items:center;">${x.is_live?'<span class="badge badge-live">🔥 LIVE</span>':''}<span class="badge">${x.category}</span></div></div>
            <p class="description">${x.description}</p>
            <div class="tags">${x.tags.slice(0,4).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
            <div class="stats"><span>⭐ ${x.stats.likes}</span><span>🔄 ${x.stats.inferences}</span></div>
            <div class="buttons"><button class="btn btn-primary" onclick="openChat('${x.id}')">💬 Ask</button><button class="btn btn-secondary" onclick="openCreate('${x.id}')">🛠 Create</button></div>
          </div>`).join('') : '<p class="empty">No models found</p>';
        loadStats(); loadSyncStatus();
      } catch(e) { document.getElementById('grid').innerHTML = '<p class="empty">❌ Error loading</p>'; }
    }

    function openChat(id) {
      curModel = id; sessId = null;
      document.getElementById('chatMsgs').innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:40px;">💬 Ask me anything...</p>';
      document.getElementById('chatInput').value = '';
      fetch(`${API}/api/models/${id}`).then(r=>r.json()).then(m=>{
        document.getElementById('chatTitle').textContent = `💬 ${m.id}`;
        document.getElementById('chatSidebar').innerHTML = `<strong>${m.name}${m.is_live?' 🔥 LIVE':''}</strong><div style="margin:10px 0;"><strong>Category:</strong> ${m.category}</div><div style="margin:10px 0;"><strong>Description:</strong> ${m.description}</div><div style="margin:10px 0;"><strong>Tags:</strong> ${m.tags.join(', ')}</div>`;
      });
      document.getElementById('chatModal').classList.add('active');
    }
    function closeModal() { document.getElementById('chatModal').classList.remove('active'); curModel = null; }
    
    async function sendChat() {
      const inp = document.getElementById('chatInput'), q = inp.value.trim();
      if(!q) return;
      const msgs = document.getElementById('chatMsgs');
      if(msgs.children.length===1 && msgs.children[0].textContent.includes('Ask me')) msgs.innerHTML='';
      msgs.innerHTML += `<div class="message user">${q}</div>`;
      inp.value = '';
      msgs.innerHTML += `<div class="message bot" style="opacity:0.6;">⏳ Thinking...</div>`;
      msgs.scrollTop = msgs.scrollHeight;
      try {
        const r = await fetch(`${API}/api/chat`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,model_id:curModel,session_id:sessId})});
        const d = await r.json();
        sessId = d.session_id;
        msgs.lastElementChild.remove();
        msgs.innerHTML += `<div class="message bot">${d.reply.replace(/\n/g,'<br>')}</div>`;
        msgs.scrollTop = msgs.scrollHeight;
      } catch(e) { msgs.lastElementChild.remove(); msgs.innerHTML += `<div class="message bot">❌ Error: ${e.message}</div>`; }
    }

    function openCreate(base) {
      document.getElementById('createForm').reset();
      document.getElementById('cBase').value = base || '';
      document.getElementById('cStatus').style.display = 'none';
      document.getElementById('createModal').classList.add('active');
    }
    function closeCreate() { document.getElementById('createModal').classList.remove('active'); }
    
    async function doCreate(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]'), st = document.getElementById('cStatus');
      btn.disabled = true; btn.textContent = '⏳ Deploying...';
      st.style.display = 'block';
      try {
        const r = await fetch(`${API}/api/models/create`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            name: document.getElementById('cName').value,
            description: document.getElementById('cDesc').value,
            category: document.getElementById('cCat').value,
            base_model: document.getElementById('cBase').value
          })
        });
        const d = await r.json();
        st.innerHTML = `📋 Task: ${d.task_id}<br>Status: ${d.status}`;
        const poll = setInterval(async ()=>{
          const x = await fetch(`${API}/api/tasks/${d.task_id}`).then(r=>r.json());
          let html = `📋 Task: ${d.task_id}<br>Status: <strong>${x.status}</strong><br>`;
          if(x.progress) html += `Progress: ${x.progress}%<br>`;
          st.innerHTML = html;
          if(x.status==='completed') {
            clearInterval(poll);
            st.innerHTML += `<br>✅ Model: <strong>${x.result?.model_id}</strong>`;
            // ✅ FIX: Wait for DB sync, then refresh
            setTimeout(async () => {
              closeCreate();
              await load();
              setTimeout(() => {
                const cards = document.querySelectorAll('.card');
                cards.forEach(card => {
                  if(card.dataset.modelId === x.result?.model_id) {
                    card.scrollIntoView({behavior:'smooth', block:'center'});
                    card.style.boxShadow = '0 0 30px #06B6D4';
                    card.style.transform = 'scale(1.05)';
                    setTimeout(() => { card.style.boxShadow = ''; card.style.transform = ''; }, 3000);
                  }
                });
              }, 500);
            }, 2000);
          } else if(x.status==='failed') {
            clearInterval(poll);
            st.innerHTML += `<br>❌ Failed: ${x.error}`;
            btn.disabled = false; btn.textContent = '→ Deploy Model';
          }
        }, 1500);
      } catch(err) {
        st.innerHTML = `❌ Error: ${err.message}`;
        btn.disabled = false; btn.textContent = '→ Deploy Model';
      }
    }

    document.getElementById('search').addEventListener('input', load);
    document.getElementById('category').addEventListener('change', load);
    document.getElementById('sourceFilter').addEventListener('change', load);
    window.onclick = e => { if(e.target.classList.contains('modal')) { closeModal(); closeCreate(); } };
    load(); loadStats(); loadSyncStatus();
    setInterval(loadStats, 30000);
    setInterval(loadSyncStatus, 60000);
  </script>
</body>
</html>
